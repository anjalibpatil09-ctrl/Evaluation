<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">
  <h2>ADMIN Dashboard</h2>
  <button onclick="logout()" class="logout-btn">Logout</button>
</div>


<div class="content">

  <div class="card">
    <h3>Create Batch</h3>

    <label>Batch Name</label>
    <input id="batchName" placeholder="Example: Java Batch Jan 2026">
    <div class="hint">Use course + month/year</div>

    <label>Start Date</label>
    <input type="date" id="startDate">

    <label>End Date</label>
    <input type="date" id="endDate">

    <button onclick="createBatch()">Create Batch</button>
  </div>

  <div class="card">
    <h3>Add Participant</h3>

    <label>Name</label>
    <input id="pName" placeholder="Anjali Patil">

    <label>Email</label>
    <input id="pEmail" placeholder="anjali@gmail.com">

    <label>Batch ID</label>
<label>Select Batch</label>
<select id="pBatch"></select>



    <label>Technology</label>
    <select id="pTech"></select>

    <button onclick="addParticipant()">Add Participant</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
